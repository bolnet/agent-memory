services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: memwright-postgres
    environment:
      POSTGRES_USER: memwright
      POSTGRES_PASSWORD: memwright
      POSTGRES_DB: memwright
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memwright -d memwright"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  neo4j:
    image: neo4j:5-community
    container_name: memwright-neo4j
    environment:
      NEO4J_AUTH: neo4j/memwright
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  neo4j-test:
    image: neo4j:5-community
    container_name: memwright-neo4j-test
    environment:
      NEO4J_AUTH: neo4j/memwright
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - neo4jtestdata:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
  neo4jdata:
  neo4jtestdata:
